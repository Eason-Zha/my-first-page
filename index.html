<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 500px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    h1 {
      font-size: 26px;
      color: #222;
      margin-bottom: 8px;
    }

    .bio {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: block;
      padding: 14px;
      border-radius: 12px;
      background: #f7f8fc;
      color: #333;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .link-btn:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="avatar">我</div>
    <h1>Ea'son</h1>
    <p class="bio">热爱技术、喜欢设计、喜欢篮球。</p>

    <div class="links">
      <a href="#" class="link-btn">GitHub</a>
      <a href="#" class="link-btn">15951715682</a>
      <a href="#" class="link-btn">zhangyilin789@163.com</a>
      <a href="#" class="link-btn">我没有博客</a>
    </div>
  </div>
</body>
</html>
